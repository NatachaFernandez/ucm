# This workflow is responsible for regenerating the HL7 Terminology IRI stem report (data/utg/iri-stems-in-hl7.md).
# It runs on a schedule and triggers the regeneration process.
# See ../../scripts/utg/README.md#workflow for more details.

name: Regenerate HL7 Terminology IRI Stem Table
on:
  workflow_dispatch:
  schedule:
    # Run this action every Tuesday at 4PM UTC (= 11am ET)
    - cron: '0 16 * * 2'

# Least-privileged token permissions needed for writing PRs
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: regenerate-hl7-terminology-iri-stem-table
  cancel-in-progress: true

jobs:
  update-report:
    name: "Regenerate HL7 Terminology IRI Stem Table"
    runs-on: ubuntu-latest

    steps:
      # Checkout our source code.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # (v6.0.2: https://github.com/actions/checkout/releases/tag/v6.0.2)
        with:
          # TODO: we need to checkout the gh-pages branch for the PR to be able to update it,
          # but it doesn't have our scripts yet.
          # ref: gh-pages
          fetch-depth: 0
          persist-credentials: false

      # Use GitHub Actions' bot to make any changes.
      - name: Set up git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Setup uv to run the Python script.
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # (v7.6.0: https://github.com/astral-sh/setup-uv/releases/tag/v7.6.0)

      # Retrieve the UTG GitHub repository to tmp/hl7-utg.
      - name: Retrieve UTG repository
        # We should really be using https://gitlab.hl7.org/hl7/UTG.git instead of
        # the GitHub mirror, which is slightly out of date, but that needs authentication,
        # and I don't want to add the extra burden of maintaining a personal access token.
        run: mkdir -p tmp/hl7-utg && git clone --depth 1 https://github.com/HL7/UTG.git tmp/hl7-utg

      # Generate the Markdown table at tmp/tmp/utg-iri-stem-report.md.
      - name: Generate IRI stem report
        run: uv run scripts/utg/generate-hl7-terminology-iri-stem-table.py --id-type iri-stem -f markdown -o tmp/utg-iri-stem-report.md tmp/hl7-utg

      # Add the header and footer to the Markdown table to make the final report.
      - name: Create final report
        run: cat data/utg/iri-stem-report-header.md tmp/utg-iri-stem-report.md data/utg/iri-stem-report-footer.md > data/utg/iri-stems-in-hl7.md

      # Has the final report changed? If not, exit early.
      - name: Check for changes to the single file `data/utg/iri-stems-in-hl7.md`.
        run: |
          # Stage only that one file to detect if it changed relative to checked out commit
          git add -N data/utg/iri-stems-in-hl7.md || true
          # Exit with code 0 if no diff; non-zero otherwise.
          if git diff --quiet -- data/utg/iri-stems-in-hl7.md; then
            echo "file_unchanged=true" >> $GITHUB_OUTPUT
            echo "No changes in data/utg/iri-stems-in-hl7.md; exiting."
            exit 0
          else
            echo "file_unchanged=false" >> $GITHUB_OUTPUT
            echo "File changed."
          fi

      # Create a PR to update the report if needed.
      - name: Create or update PR (commit workspace changes)
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # (v8.1.0: https://github.com/peter-evans/create-pull-request/releases/tag/v8.1.0)
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/regenerate-hl7-terminology-iri-stem-table # fixed branch name → updates existing PR if present
          title: "Update HL7 Terminology IRI Stem Table"
          reviewers: dbooth-boston, ericprud # comma-separated list of reviewers
          body: |
            This PR was opened automatically by .github/workflows/regenerate-hl7-terminology-iri-stem-table.yml.
            It updates the generated file `data/utg/iri-stems-in-hl7.md`.
          commit-message: "chore: update data/utg/iri-stems-in-hl7.md (automated)"
          delete-branch: false # keep false so branch/PR can be updated on next run; set true if you prefer branch cleanup after merge
          labels: automated
          add-paths: data/utg/iri-stems-in-hl7.md
